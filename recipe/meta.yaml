{% set name = "hugo" %}
{% set version = "0.164.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/gohugoio/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 4d32803c88e76179bc48cf640821977dd1cd83a8aa64ee17766557a15e538825

build:
  number: 0
  binary_relocation: false
  # Hugo binaries are statically linked on Windows, so the
  # following silences some warnings from conda-forge about
  # already exported DSOs.
  ignore_run_exports:
    - libstdcxx  # [win]
    - libwinpthread  # [win]
    - libgcc  # [win]

requirements:
  build:
    - {{ compiler('c') }}                    # [not (win and arm64)]
    - {{ compiler('cxx') }}                  # [not (win and arm64)]
    - {{ stdlib("c") }}                      # [not (win and arm64)]
    - {{ compiler('go-cgo') }}               # [not (win and arm64)]
    - {{ compiler('go-nocgo') }}             # [win and arm64]
    - go-licenses

test:
  commands:
    - hugo help
    - hugo version

about:
  home: https://gohugo.io/
  dev_url: https://github.com/gohugoio/hugo
  summary: The extended version of the Hugo static site generator – the world's fastest framework for building websites.
  license: Apache-2.0
  license_file:
    - LICENSE
    - library_licenses/

extra:
  recipe-maintainers:
    - moritzwilksch
    - dbast
    - agriyakhetarpal
